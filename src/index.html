<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Astro Fray — ECS Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #050510;
      overflow: hidden;
      cursor: crosshair;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #debugHud {
      position: fixed;
      left: 12px;
      bottom: 12px;
      color: #00f0ff;
      font-size: 12px;
      opacity: 0.7;
      pointer-events: none;
      text-shadow: 0 0 6px rgba(0,240,255,0.4);
      white-space: pre-line;
    }
    #ecsTitle {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: #00f0ff;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(0,240,255,0.6);
      pointer-events: none;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <canvas id="ecsCanvas"></canvas>
  <div id="ecsTitle">⬡ ECS PROTOTYPE — WASD移動 / マウスエイム / Shift=ブースト</div>
  <div id="debugHud"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
